name: Python Test

on:
  push:
    branches:
      - main
      - master
      - release/*
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.10
    - name: Install dependencies
      run: uv sync --frozen --extra dev
    - name: Run tests
      run: uv run --project ${{ github.workspace }} python -m pytest tests/release/integration -v
